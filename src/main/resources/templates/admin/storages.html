<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Склады — АРМ.Вещи</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    
    <div class="main-content">
        <div th:replace="~{fragments/topbar :: topbar}"></div>
        
        <div class="content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1 class="page-title" style="margin: 0;">Склады</h1>
                <button onclick="openModal('add-storage-modal')" class="btn btn-primary">+ Добавить склад</button>
            </div>
            
            <div class="card">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Наименование</th>
                                <th>Тип</th>
                                <th>Количество ячеек</th>
                                <th>Свободно ячеек</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="storage : ${storages}">
                                <td th:text="${storage.id}">1</td>
                                <td><strong th:text="${storage.name}">Склад №1</strong></td>
                                <td>
                                    <span class="status" 
                                          th:classappend="${storage.storageType.name() == 'LONG_TERM' ? 'status-placed' : 'status-created'}">
                                        <span th:text="${storage.storageType.displayName}">Долговременный</span>
                                    </span>
                                </td>
                                <td th:text="${#lists.size(storage.cells)}">10</td>
                                <td th:text="${storage.cells.?[!isOccupied].size()}">5</td>
                                <td>
                                    <div style="display: flex; gap: 5px;">
                                        <a th:href="@{'/admin/cells?storageId=' + ${storage.id}}" 
                                           class="btn btn-outline btn-sm">📦 Ячейки</a>
                                        <button class="btn btn-outline btn-sm">✏</button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно добавления склада -->
    <div id="add-storage-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3>Добавить склад</h3>
                <button class="modal-close" onclick="closeModal('add-storage-modal')">✕</button>
            </div>
            <form th:action="@{/admin/storages/create}" method="post">
                <div class="form-group">
                    <label>Наименование склада *</label>
                    <input type="text" name="name" class="form-control" required 
                           placeholder="Например: Склад долговременного хранения №2">
                </div>
                <div class="form-group">
                    <label>Тип склада *</label>
                    <select name="storageType" class="form-control" required>
                        <option value="">Выберите тип</option>
                        <option value="RECEPTION">Склад приёмного отделения</option>
                        <option value="LONG_TERM">Склад долговременного хранения</option>
                    </select>
                </div>
                <div style="background: #e3f2fd; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                    <strong>⚠ Важно:</strong>
                    <ul style="margin: 10px 0 0 20px; font-size: 13px;">
                        <li><strong>Склад приёмного отделения</strong> — не может содержать ячейки</li>
                        <li><strong>Склад долговременного хранения</strong> — может содержать ячейки для точного учёта</li>
                    </ul>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-success">Сохранить</button>
                    <button type="button" class="btn btn-outline" onclick="closeModal('add-storage-modal')">Отмена</button>
                </div>
            </form>
        </div>
    </div>
    
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
