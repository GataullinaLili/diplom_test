server:
  port: 8080
  servlet:
    session:
      timeout: 30m

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/item_storage
    username: item_storage_user
    password: ${DB_PASSWORD:secret}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  thymeleaf:
    cache: false

# Интеграция с МИС (заглушка для разработки)
mis:
  api:
    url: https://mis.internal/api
    token: ${MIS_TOKEN:dev-token}

# Параметры QR
qr:
  width: 300
  height: 300
