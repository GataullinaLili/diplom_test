<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История операций — АРМ.Вещи</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    
    <div class="main-content">
        <div th:replace="~{fragments/topbar :: topbar}"></div>
        
        <div class="content">
            <h1 class="page-title">История операций</h1>
            
            <!-- Фильтры -->
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Фильтры поиска</h3>
                </div>
                <form th:action="@{/audit/search}" method="post">
                    <div class="audit-filters">
                        <div class="form-group" style="margin: 0;">
                            <label>ФИО пациента</label>
                            <input type="text" name="patientFio" class="form-control" 
                                   placeholder="Часть ФИО...">
                        </div>
                        <div class="form-group" style="margin: 0;">
                            <label>ФИО сотрудника</label>
                            <input type="text" name="employeeFio" class="form-control" 
                                   placeholder="Часть ФИО...">
                        </div>
                        <div class="form-group" style="margin: 0;">
                            <label>Дата с</label>
                            <input type="date" name="startDate" class="form-control">
                        </div>
                        <div class="form-group" style="margin: 0;">
                            <label>Дата по</label>
                            <input type="date" name="endDate" class="form-control">
                        </div>
                    </div>
                    <div style="display: flex; gap: 10px; margin-top: 15px;">
                        <button type="submit" class="btn btn-primary">🔍 Найти</button>
                        <button type="reset" class="btn btn-outline">Очистить</button>
                    </div>
                </form>
            </div>
            
            <!-- Результаты -->
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Результаты</h3>
                    <button onclick="exportToExcel()" class="btn btn-outline btn-sm">📥 Экспорт</button>
                </div>
                
                <div class="timeline">
                    <div th:each="log : ${logs}" class="timeline-item">
                        <div style="display: flex; justify-content: space-between; align-items: start;">
                            <div>
                                <strong th:text="${log.action}">РАЗМЕЩЕНИЕ</strong>
                                <span style="color: #888; margin-left: 10px; font-size: 13px;"
                                      th:text="${#temporals.format(log.performedAt, 'dd.MM.yyyy HH:mm:ss')}">
                                    01.01.2024 10:00:00
                                </span>
                            </div>
                            <span class="status"
                                  th:classappend="${log.action == 'СОЗДАНИЕ_ОПИСИ' ? 'status-created' :
                                                   (log.action == 'РАЗМЕЩЕНИЕ' ? 'status-placed' :
                                                   (log.action == 'ПЕРЕМЕЩЕНИЕ' ? 'status-moved' : 'status-issued'))}">
                                <span th:text="${log.action}">РАЗМЕЩЕНИЕ</span>
                            </span>
                        </div>
                        <p th:text="${log.details}" style="margin: 8px 0; color: #555;">
                            Перемещено: Склад №1, Ячейка А-01 -> Склад №2, Ячейка Б-03
                        </p>
                        <p style="font-size: 13px;">
                            <strong>Пациент:</strong> <span th:text="${log.patientFio}">Иванов И.И.</span> |
                            <strong>Сотрудник:</strong> <span th:text="${log.performedBy}">Петров П.П.</span> |
                            <strong>Опись №:</strong> <span th:text="${log.inventoryId}">1001</span>
                        </p>
                    </div>
                </div>
                
                <div th:if="${#lists.isEmpty(logs)}" style="text-align: center; padding: 40px; color: #888;">
                    <p style="font-size: 48px; margin-bottom: 10px;">📭</p>
                    <p>Нет записей, соответствующих фильтрам</p>
                </div>
            </div>
        </div>
    </div>
    
    <script th:src="@{/js/app.js}"></script>
    <script>
        function exportToExcel() {
            window.location.href = '/audit/export?' + new URLSearchParams(new FormData(document.querySelector('form')));
        }
    </script>
</body>
</html>
