<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ячейки — АРМ.Вещи</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    
    <div class="main-content">
        <div th:replace="~{fragments/topbar :: topbar}"></div>
        
        <div class="content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1 class="page-title" style="margin: 0;">Ячейки</h1>
                <button onclick="openModal('add-cell-modal')" class="btn btn-primary">+ Добавить ячейку</button>
            </div>
            
            <div class="card">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Наименование</th>
                                <th>Склад</th>
                                <th>Статус</th>
                                <th>QR-код</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="cell : ${cells}">
                                <td th:text="${cell.id}">1</td>
                                <td><strong th:text="${cell.name}">Ячейка А-01</strong></td>
                                <td th:text="${cell.storage.name}">Склад №1</td>
                                <td>
                                    <span class="status" 
                                          th:classappend="${cell.isOccupied ? 'status-issued' : 'status-placed'}">
                                        <span th:text="${cell.isOccupied ? 'Занята' : 'Свободна'}">Свободна</span>
                                    </span>
                                </td>
                                <td>
                                    <button onclick="printQrCode('CELL-' + ${cell.id})" 
                                            class="btn btn-outline btn-sm">🖨 QR</button>
                                </td>
                                <td>
                                    <div style="display: flex; gap: 5px;">
                                        <button class="btn btn-outline btn-sm">✏</button>
                                        <button class="btn btn-danger btn-sm">🗑</button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно добавления ячейки -->
    <div id="add-cell-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3>Добавить ячейку</h3>
                <button class="modal-close" onclick="closeModal('add-cell-modal')">✕</button>
            </div>
            <form th:action="@{/admin/cells/create}" method="post">
                <div class="form-group">
                    <label>Наименование ячейки *</label>
                    <input type="text" name="name" class="form-control" required 
                           placeholder="Например: А-01">
                </div>
                <div class="form-group">
                    <label>Склад *</label>
                    <select name="storageId" class="form-control" required>
                        <option value="">Выберите склад</option>
                        <option th:each="storage : ${storages}" 
                                th:if="${storage.storageType.name() == 'LONG_TERM'}"
                                th:value="${storage.id}" 
                                th:text="${storage.name}">Склад №1</option>
                    </select>
                </div>
                <div style="background: #fff3e0; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                    ⚠ Ячейки можно создавать только на складах долговременного хранения
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-success">Сохранить</button>
                    <button type="button" class="btn btn-outline" onclick="closeModal('add-cell-modal')">Отмена</button>
                </div>
            </form>
        </div>
    </div>
    
    <script th:src="@{/js/app.js}"></script>
    <script>
        function printQrCode(data) {
            fetch('/api/qrcode?data=' + encodeURIComponent(data))
                .then(res => res.text())
                .then(base64 => {
                    const win = window.open('', '_blank');
                    win.document.write(`<img src="${base64}" style="width: 200px;"><br><p>${data}</p>`);
                    win.print();
                });
        }
    </script>
</body>
</html>
