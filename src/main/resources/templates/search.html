<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск пациента — АРМ.Вещи</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">
        <div th:replace="~{fragments/topbar :: topbar}"></div>

        <div class="content">
            <h1 class="page-title">Поиск пациента</h1>

            <div class="card">
                <div class="search-box">
                    <input type="text" id="patient-search" 
                           placeholder="Введите ФИО, номер истории или ФИО и дату рождения (пример: Иванов И.И. 20.03.1981)">
                    <button onclick="searchPatient()" class="btn btn-primary">🔍 Найти</button>
                </div>
                <div style="color: #888; font-size: 13px; margin-top: 5px;">
                    Примеры поиска: Иванов | ИБ-12345 | Иванов И.И. 01.01.1980
                </div>
            </div>

            <!-- Результаты поиска -->
            <div id="search-results" style="display: none;">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Найденные пациенты</h3>
                    </div>
                    <div id="patient-list"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно создания описи -->
    <div id="create-inventory-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3>Создание описи хранения</h3>
                <button class="modal-close" onclick="closeModal('create-inventory-modal')">✕</button>
            </div>
            <div id="selected-patient-info" style="margin-bottom: 20px;"></div>
            <form id="inventory-form" th:action="@{/api/inventory/create}" method="post">
                <input type="hidden" id="medical-card-number" name="medicalCardNumber">

                <div id="items-container">
                    <div class="form-group">
                        <label>Название вещи</label>
                        <input type="text" name="items[0].name" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Количество</label>
                        <select name="items[0].quantity" class="form-control">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Описание</label>
                        <textarea name="items[0].description" class="form-control" rows="2"
                                  placeholder="Цвет, размер, особые приметы"></textarea>
                    </div>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button type="button" onclick="addItem()" class="btn btn-outline">+ Добавить вещь</button>
                    <button type="submit" class="btn btn-success">Сохранить опись</button>
                </div>
            </form>
        </div>
    </div>

    <script th:src="@{/js/app.js}"></script>
    <script>
        let itemIndex = 1;

        function searchPatient() {
            const query = document.getElementById('patient-search').value;
            if (!query) return;

            fetch('/search/api?query=' + encodeURIComponent(query))
                .then(res => res.json())
                .then(patients => {
                    const container = document.getElementById('search-results');
                    const list = document.getElementById('patient-list');

                    if (patients.length === 0) {
                        list.innerHTML = '<p style="text-align: center; color: #888; padding: 20px;">Пациентов не найдено</p>';
                    } else {
                        let html = '';
                        patients.forEach(p => {
                            html += `
                                <div style="display: flex; justify-content: space-between; align-items: center;
                                     padding: 15px; border-bottom: 1px solid #eee;">
                                    <div>
                                        <strong>${p.fullName}</strong>
                                        <span style="color: #888; margin-left: 10px;">№ ИБ: ${p.medicalCardNumber}</span>
                                        <span style="color: #888; margin-left: 10px;">Дата рождения: ${p.birthDate || '—'}</span>
                                    </div>
                                    <button onclick="selectPatient('${p.medicalCardNumber}', '${p.fullName}')"
                                            class="btn btn-primary btn-sm">
                                        Добавить опись хранения
                                    </button>
                                </div>`;
                        });
                        list.innerHTML = html;
                    }
                    container.style.display = 'block';
                });
        }

        function selectPatient(cardNumber, fullName) {
            document.getElementById('medical-card-number').value = cardNumber;
            document.getElementById('selected-patient-info').innerHTML = 
                `<div style="background: #e3f2fd; padding: 15px; border-radius: 8px;">
                    <strong>Пациент:</strong> ${fullName}<br>
                    <strong>Номер истории:</strong> ${cardNumber}
                </div>`;
            openModal('create-inventory-modal');
        }

        function addItem() {
            const container = document.getElementById('items-container');
            const html = `
                <hr style="margin: 20px 0;">
                <h5 style="margin-bottom: 10px;">Вещь #${itemIndex + 1}</h5>
                <div class="form-group">
                    <label>Название вещи</label>
                    <input type="text" name="items[${itemIndex}].name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Количество</label>
                    <select name="items[${itemIndex}].quantity" class="form-control">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea name="items[${itemIndex}].description" class="form-control" rows="2"></textarea>
                </div>`;
            container.insertAdjacentHTML('beforeend', html);
            itemIndex++;
        }
    </script>
</body>
</html>
